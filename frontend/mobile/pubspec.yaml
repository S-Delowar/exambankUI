name: exambank
description: "ExamBank mobile — Bangladeshi admission-test prep."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  provider: ^6.1.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/chapters.yaml
