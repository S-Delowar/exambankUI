    - matrices_and_determinants
    - vectors
    - straight_lines
    - circles
    - permutations_and_combinations
    - trigonometric_ratios
    - associated_trigonometric_angles
    - functions_and_graphs
    - differential_calculus
    - integral_calculus
  paper_2:
    - real_numbers_and_inequalities
    - linear_programming
    - complex_numbers
    - polynomials_and_polynomial_equations
    - binomial_expansion
    - conics
    - inverse_trigonometric_functions_and_trigonometric_equations
    - statics
    - dynamics
    - measure_of_dispersion_and_probability

biology:
  paper_1:
    - cell_and_its_structure
    - cell_division
    - cell_chemistry
    - microorganisms
    - algae_and_fungi
    - bryophyta_and_pteridophyta
    - gymnosperms_and_angiosperms
    - tissue_and_tissue_system
    - plant_physiology
    - plant_reproduction
    - biotechnology
    - environment_expansion_and_conservation_of_organisms
  paper_2:
    - animal_diversity_and_classification
    - animal_identity
    - human_physiology_digestion_and_absorption
    - human_physiology_blood_and_circulation
    - human_physiology_breathing_and_respiration
    - human_physiology_waste_and_excretion
    - human_physiology_locomotion_and_movement
    - human_physiology_coordination_and_control
    - continuation_of_human_life
    - immunity_of_human_body
    - genetics_and_evolution
    - animal_behavior

bangla:
  - grammar
  - literature
  - vocabulary
  - comprehension

english:
