# Bangla display labels for chapter keys defined in `chapters.yaml`.
#
# This file is for display only. The canonical chapter id remains the
# English snake_case key in `chapters.yaml`; that is what gets stored in
# question rows, what Gemini echoes back, and what admin tools edit. The
# Bangla string here is looked up by the frontend (and any other UI) when
# rendering a chapter to the user.
#
# Subject grouping mirrors `chapters.yaml` purely for human review parity.
# A chapter key missing from this file falls back to a prettified version
# of the English key on the frontend, so adding a new chapter to
# `chapters.yaml` won't crash the UI — it will just look slightly off
# until it's translated here.
#
# Translations follow common NCTB HSC textbook phrasing where one exists.
# Review before shipping to users.

